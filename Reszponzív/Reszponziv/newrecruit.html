<!DOCTYPE html>

<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Viharbérc</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">

                    <li class="nav-item">

    <div class="container mt-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3>Új Tanuló / Kalandor felvétele</h3>
            </div>
            <div class="card-body">
                <form action="#" method="post">
                    <div class="mb-3">
                        <label for="nev" class="form-label">Név</label>
                        <input type="text" class="form-control" id="nev" placeholder="Hős neve">
                    </div>

                    <div class="mb-3">
                        <label for="szarmazas" class="form-label">Származás</label>
                        <input type="text" class="form-control" id="szarmazas" placeholder="Származási hely">
                    </div>

                    <div class="mb-3">
                        <label for="kaszt" class="form-label">Kaszt</label>
                        <input type="text" class="form-control" id="kaszt" placeholder="Add meg a kasztot">
                    </div>

                    <button type="submit" class="btn btn-primary mt-3 w-100">Toborzás</button>
                </form>
            </div>
        </div>
    </div>
